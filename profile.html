<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - HelpHub AI</title>
    <link rel="stylesheet" href="profile.css">
</head>

<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo-section">
                <a href="home.html" class="logo">H</a>
                <span class="logo-text">HelpHub AI</span>
            </div>

            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-link">Dashboard</a>
                <a href="#" class="nav-link">Onboarding</a>
                <a href="profile.html" class="nav-link active">Profile</a>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-container">
        <!-- Hero Section -->
        <section class="hero-section">
            <div class="hero-content">
                <span class="hero-label">PROFILE</span>
                <h1 class="hero-title">Ayesha Khan</h1>
                <p class="hero-subtitle">Both • Karachi</p>
            </div>
        </section>

        <!-- Content Wrapper -->
        <div class="content-wrapper">
            <!-- Left Column - Public Profile -->
            <section class="public-profile-section">
                <div class="section-header">
                    <span class="section-label">PUBLIC PROFILE</span>
                    <h2 class="section-title">Skills and reputation</h2>
                </div>

                <!-- Trust Score -->
                <div class="stat-row">
                    <span class="stat-label">Trust score</span>
                    <span class="stat-value">92%</span>
                </div>

                <!-- Contributions -->
                <div class="stat-row">
                    <span class="stat-label">Contributions</span>
                    <span class="stat-value">31</span>
                </div>

                <!-- Skills Section -->
                <div class="profile-section">
                    <h3 class="profile-section-title">Skills</h3>
                    <div class="badges-group">
                        <span class="badge-skill">Figma</span>
                        <span class="badge-skill">UI/UX</span>
                        <span class="badge-skill">HTML/CSS</span>
                        <span class="badge-skill">Career Guidance</span>
                    </div>
                </div>

                <!-- Badges Section -->
                <div class="profile-section">
                    <h3 class="profile-section-title">Badges</h3>
                    <div class="badges-group">
                        <span class="badge-achievement">Design Ally</span>
                        <span class="badge-achievement">Fast Responder</span>
                        <span class="badge-achievement">Top Mentor</span>
                    </div>
                </div>
            </section>

            <!-- Right Column - Edit Profile -->
            <section class="edit-profile-section">
                <div class="section-header">
                    <span class="section-label">EDIT PROFILE</span>
                    <h2 class="section-title">Update your identity</h2>
                </div>

                <form class="profile-form">
                    <!-- Name and Location Row -->
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-input" value="Ayesha Khan">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Location</label>
                            <input type="text" class="form-input" value="Karachi">
                        </div>
                    </div>

                    <!-- Skills Field -->
                    <div class="form-group">
                        <label class="form-label">Skills</label>
                        <input type="text" class="form-input" value="Figma, UI/UX, HTML/CSS, Career Guidance">
                    </div>

                    <!-- Interests Field -->
                    <div class="form-group">
                        <label class="form-label">Interests</label>
                        <input type="text" class="form-input" value="Hackathons, UI/UX, Community Building">
                    </div>

                    <!-- Save Button -->
                    <button type="submit" class="btn-save">Save profile</button>
                </form>
            </section>
        </div>
    </main>
</body>

</html>
